mutation SaveOffer($input: CreateOfferInput!) {
  saveOffer(input: $input) {
    data {
      id
      uwResultId
      uwResultRevision
      compTemplateId
      frequency
      frequencyInterval
      firstPaymentDate
      paymentTerm
      maxPaymentTerm
      enrolledDebt
      enrollmentPlanId
      enrollmentPlanName
      serviceFee
      estimatedSettlementFee
      totals {
        ...OfferTotalsFields
      }
      payments {
        ...OfferPaymentFields
      }
      forthRequestParameters {
        ...ForthRequestParametersFields
      }
    }
    errors {
      message
    }
  }
}
