	"""
	Credit Report Source to specify where to pull the credit report from. Possible values are:
	- SPINWHEEL
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- ARRAY_EQUIFAX
	- ARRAY_EQUIFAX_KBA
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	creditReportSource: CREDIT_REPORT_PULL_SOURCE!

	"""
	Requesting organization contact ID
	"""
	reqOrgContactId: String!

	"""
	Sigma lead ID (optional)
	"""
	leadId: String

	"""
	Contact first name
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	firstName: String

	"""
	Contact middle name
	*** OPTIONAL when creditReportSource is:
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	middleName: String

	"""
	Contact last name
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	lastName: String

	"""
	Contact name suffix (e.g., Jr., Sr., II, III)
	*** OPTIONAL when creditReportSource is:
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	suffix: String

	"""
	Contact social security number
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	ssn: String

	"""
	Contact date of birth in yyyy-mm-dd format 1990-04-12
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	dob: String

	"""
	Contact address line 1
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	addressLine1: String

	"""
	Contact address line 2
	*** OPTIONAL when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	addressLine2: String

	"""
	Contact address city
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	city: String

	"""
	Contact address state
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_EQUIFAX
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	state: String

	"""
	Contact address zip code
	*** REQUIRED when creditReportSource is:
	- ARRAY_EQUIFAX
	- CRS_TRANSUNION
	- CRS_STANDARD_PREQUAL_VANTAGE4_TU
	"""
	zip: String

	"""
	User verification id
	*** REQUIRED when creditReportSource is ARRAY_EQUIFAX_KBA
	"""
	userVerificationId: String
