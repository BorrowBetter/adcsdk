"""
Flow type for underwriting configuration. Controls which set of filters to apply.
"""
enum FlowType {
  """
  Opener flow — typically uses a relaxed set of checks for initial qualification
  """
  OPENER

  """Full review flow — uses the complete set of checks"""
  FULL_REVIEW
}

"""V2: Enrollment payment plan configuration."""
input PlanInputV2 {
  """
  Payment frequency code. Accepted values: 'BW' (biWeekly), 'SM' (semiMonthly), 'M' (monthly).
  """
  frequency: String

  """First payment amount. Ex: 100, 123.45,"""
  firstPaymentAmount: Float

  """Second payment amount. Ex: 100, 123.45,"""
  secondPaymentAmount: Float

  """
  First payment date. Accepted formats: MM/DD/YYYY, YYYY/MM/DD, YYYY-MM-DD. Stored as YYYY-MM-DD.
  """
  firstPaymentDate: String

  """First draft exception. Ex: YES, NO"""
  firstDraftException: String

  """Program term."""
  programTerm: Int

  """Fee percentage. Ex: 27"""
  feePercentage: Float

  """EPF reduction. Ex: YES, NO"""
  epfReduction: String

  """
  Second payment date. Accepted formats: MM/DD/YYYY, YYYY/MM/DD, YYYY-MM-DD. Stored as YYYY-MM-DD.
  """
  secondPaymentDate: String

  """Enrollment plan ID."""
  planId: String

  """
  depositIntervals values can be
  If frequency is BW (biWeekly) valid options are 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday' - Default is 'Monday'. Example 'Monday'
  If frequency is SM (semiMonthly) then 2 values need to be passed  where valid options are the 1-30. Example '1,15'
  If frequency is M (monthly) valid options are the 1-30. Example '1'
  """
  depositIntervals: String

  """sentry fee opt-out by setting to false"""
  includeSentryFee: Boolean
}

