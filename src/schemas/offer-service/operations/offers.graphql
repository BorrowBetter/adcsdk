mutation Offers($input: OffersInput!) {
  offers(input: $input) {
    data {
      compTemplateId
      frequency
      frequencyInterval
      firstPaymentDate
      paymentTerm
      maxPaymentTerm
      enrolledDebt
      enrollmentPlanId
      enrollmentPlanName
      serviceFee
      estimatedSettlementFee
      totals {
        fee1
        fee2
        fee3
        fee4
        fee5
        fee6
        fee7
        savings
        totalPayment
      }
      payments {
        paymentNumber
        paymentDate
        totalPayment
        fee1
        fee2
        fee3
        fee4
        fee5
        fee6
        fee7
        savings
      }
      forthRequestParameters {
        epFee1Amount
        epFee2Monthly
        epFee3Amount
        epFee3Monthly
        epFee4Monthly
        epFee4Amount
        epFee5Monthly
        epFee5Amount
        firstPaymentDate
        recurringStartDate
        epFrequency
        epFreqInterval
        debt
        enrollmentPlan
        programMonths
        maxPaymentTerm
        estSettlement
      }
    }
    errors {
      message
    }
  }
}
